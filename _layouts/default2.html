---
layout: compress
---
<!DOCTYPE HTML>
<html lang="en">
<head>
  <title>{{ site.title }}</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <style>{% capture css %}{% include_relative assets/css/main.css %}{% endcapture %}{{ css }}</style>
</head>

{% assign image = site.static_files | where_exp: "file", "file.path contains 'fulls'" | last %}
<body style="--bg:url('{{ image.path }}')">

    {{ content }}

    <!-- Deferred JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js" defer></script>
    <script src="{{ site.baseurl }}/assets/js/main.js" defer></script>
</body>
</html>
