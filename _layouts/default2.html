---
layout: compress
---
<!DOCTYPE HTML>
<html>
<head>
    {% include header2.html %}
</head>
{% assign image = site.static_files | where_exp: "file", "file.path contains 'fulls'" | last %}
<body style="--bg:url('{{ image.path }}')">

    {{ content }}

    <!-- Deferred CSS (non-critical) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" media="print" onload="this.media='all'">
    
    <!-- Deferred JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js" defer></script>
    <script src="{{ site.baseurl }}/assets/js/main.js" defer></script>
</body>
</html>
