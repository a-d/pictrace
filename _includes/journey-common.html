<!-- Common styles and scripts for journey maps - include once in layout -->
<style>
  .map {
    background-image: var(--bg);
    background-size: cover;
    background-position: left bottom;
    letter-spacing: 0;
  }

  .map-container {
    flex: 0 0 45%;
    position: sticky;
    top: 1em;
    height: fit-content;
  }

  .map-wrapper {
    position: relative;
    width: 130%;
    margin: 0 auto;
    left: -5%;
  }

  .map-wrapper > svg {
    width: 100%;
    height: auto;
    max-height: calc(100vh - 3.5em);
  }

  /* The travel path with scroll animation */
  .travel-path {
    fill: none;
    stroke: #ff6b35;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    animation: draw-path linear;
    animation-timeline: view();
    animation-range: entry 0% cover 100%;
  }

  @keyframes draw-path {
    from {
      stroke-dashoffset: var(--path-length, 400);
    }
    to {
      stroke-dashoffset: 0;
    }
  }

  /* Fallback for browsers without CSS scroll-driven animations */
  @supports not (animation-timeline: view()) {
    .travel-path {
      /* JavaScript will handle this */
    }
  }
</style>

<script>
(function() {
  /* Only define once */
  if (window.journeyMapInitialized) return;
  window.journeyMapInitialized = true;

  /* Progress mapping function factory for smooth animation */
  /* Each journey can have its own progress curve */
  window.makeProgressMapper = function(points) {
    return function(t) {
      if (t <= points[0][0]) return points[0][1];
      if (t >= points[points.length - 1][0]) return points[points.length - 1][1];

      let i = 1;
      while (i < points.length && t > points[i][0]) i++;
      const p0 = points[Math.max(i - 2, 0)];
      const p1 = points[i - 1];
      const p2 = points[i];
      const p3 = points[Math.min(i + 1, points.length - 1)];

      const u = (t - p1[0]) / (p2[0] - p1[0]);

      /* Catmull–Rom spline */
      const y =
        0.5 *
        ((2 * p1[1]) +
          (-p0[1] + p2[1]) * u +
          (2 * p0[1] - 5 * p1[1] + 4 * p2[1] - p3[1]) * u * u +
          (-p0[1] + 3 * p1[1] - 3 * p2[1] + p3[1]) * u * u * u);

      return Math.min(1, Math.max(0, y));
    };
  };

  /* Default linear progress (can be overridden per journey) */
  var defaultProgress = function(t) { return t; };

  /* Check if CSS scroll-driven animations are supported */
  const supportsScrollTimeline = CSS.supports('animation-timeline', 'view()');

  if (!supportsScrollTimeline) {
    const gallery = document.querySelector('.gallery');
    const maps = [];

    /* Initialize all journey maps */
    function initJourneyMaps() {
      document.querySelectorAll('.map[pathId]').forEach(function(mapElement) {
        if (mapElement.dataset.journeyInitialized) return;
        mapElement.dataset.journeyInitialized = 'true';

        const pathId = mapElement.getAttribute('pathId');
        const path = mapElement.querySelector('path[id="' + pathId + '"]');
        if (!path) return;

        const pathLength = path.getTotalLength();
        path.style.strokeDasharray = pathLength;
        path.style.strokeDashoffset = pathLength;

        /* Get journey-specific progress mapper if defined, otherwise use default */
        const progressFnName = mapElement.getAttribute('progressFn');
        const progressFn = (progressFnName && window[progressFnName]) ? window[progressFnName] : defaultProgress;

        maps.push({
          element: mapElement,
          path: path,
          pathLength: pathLength,
          count: parseInt(mapElement.getAttribute('count'), 10) || 10,
          progressFn: progressFn
        });
      });
    }

    function updateAllPaths() {
      const windowHeight = window.innerHeight;
      const columns = gallery ? getComputedStyle(gallery).gridTemplateColumns.split(' ').length - 1 : 1;

      maps.forEach(function(map) {
        map.element.style.gridRow = 'span ' + Math.ceil(map.count / columns);

        const rect = map.element.getBoundingClientRect();
        const totalDistance = rect.bottom - rect.top;
        const scrolledDistance = windowHeight - rect.top;

        let scrollPercent = 0;
        if (totalDistance > 0) {
          scrollPercent = Math.max(0, Math.min(1, scrolledDistance / totalDistance));
        }
        /* Use journey-specific progress function */
        scrollPercent = map.progressFn(scrollPercent);

        const drawLength = map.pathLength * scrollPercent;
        map.path.style.strokeDashoffset = map.pathLength - drawLength;
      });
    }

    /* Initialize on DOM ready and handle dynamic content */
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        initJourneyMaps();
        updateAllPaths();
      });
    } else {
      initJourneyMaps();
      updateAllPaths();
    }

    /* Single event listeners for all maps */
    window.addEventListener('scroll', updateAllPaths);
    window.addEventListener('resize', function() {
      initJourneyMaps();
      updateAllPaths();
    });
  }
})();
</script>
